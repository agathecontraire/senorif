<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SENORIF interactif</title>

<style>
:root {
  --bg:#ffffff;
  --card:#c5d8e8;
  --text:#233044;
  --muted:#617086;
  --border:#e5e7eb;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.wrapper {
  max-width:1180px;
  margin:0 auto;
  padding:34px 22px 70px;
}

header {
  text-align:center;
  margin-bottom:30px;
}

h1 {
  color:#4868a8;
  font-size:clamp(34px,5vw,58px);
  font-weight:900;
}

.subtitle {
  color:var(--muted);
  font-size:17px;
  margin-top:8px;
}

.search-box {
  max-width:680px;
  margin:28px auto 0;
  display:flex;
  gap:10px;
}

.search-box input {
  flex:1;
  border:1px solid var(--border);
  border-radius:999px;
  padding:13px 18px;
  font-size:15px;
  outline:none;
}

.search-box input:focus {
  border-color:#4868a8;
  box-shadow:0 0 0 3px rgba(72,104,168,.12);
}

.search-box button {
  border:0;
  border-radius:999px;
  background:#4868a8;
  color:white;
  padding:13px 18px;
  font-weight:900;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  align-items:start;
}

.chapter summary {
  list-style:none;
  position:relative;
  width:100%;
  min-height:126px;
  border:0;
  border-radius:0 18px 18px 0;
  background:var(--card);
  color:#6d82a5;
  font-size:22px;
  font-weight:800;
  line-height:1.15;
  padding:18px 18px 18px 28px;
  cursor:pointer;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 3px 10px rgba(31,50,90,.06);
  overflow:hidden;
}

.chapter summary::-webkit-details-marker { display:none; }

.chapter summary::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:24px;
  background:var(--accent);
}

.chapter[open] summary {
  background:color-mix(in srgb, var(--accent) 78%, white);
  color:white;
}

.chapter[open] summary::before { background:var(--accent); }

.panel {
  background:color-mix(in srgb, var(--accent) 84%, #233044);
  color:white;
  border-radius:0 0 18px 18px;
  padding:28px 26px 32px;
  margin-top:10px;
  box-shadow:0 10px 24px rgba(31,50,90,.13);
}

.arrow {
  width:46px;
  height:34px;
  margin:0 0 18px 12px;
  position:relative;
}

.arrow::before,
.arrow::after {
  content:"";
  position:absolute;
  width:34px;
  height:7px;
  background:#e5efff;
  border-radius:999px;
  top:14px;
}

.arrow::before { transform:rotate(-45deg); left:0; }
.arrow::after { transform:rotate(45deg); left:21px; }

.panel h2 {
  font-size:26px;
  margin-bottom:18px;
  color:#eef5ff;
}

.panel ul { list-style:none; }

.panel li { margin:8px 0; }

.subchapter-btn {
  width:100%;
  border:0;
  background:transparent;
  color:#eef5ff;
  display:flex;
  gap:12px;
  align-items:flex-start;
  text-align:left;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
  padding:4px 0;
}

.subchapter-btn:hover span:last-child { text-decoration:underline; }

.chev {
  font-size:23px;
  line-height:1;
  color:#d9e8ff;
  font-weight:300;
}

.page {
  display:none;
  max-width:1050px;
  margin:0 auto;
  padding:34px 22px 70px;
}

.page.active { display:block; }

.back {
  border:0;
  border-radius:999px;
  background:#f3f4f6;
  color:#374151;
  padding:11px 16px;
  font-weight:900;
  cursor:pointer;
  margin-bottom:22px;
  box-shadow:0 4px 14px rgba(31,50,90,.08);
}

.article {
  background:white;
  border-radius:24px;
  padding:34px;
  box-shadow:0 12px 30px rgba(31,50,90,.10);
  border-top:12px solid var(--article-color);
}

.article .chapter-label {
  color:var(--article-color);
  font-weight:900;
  font-size:14px;
  margin-bottom:8px;
}

.article h2 {
  font-size:34px;
  color:#111827;
  margin-bottom:10px;
}

.pages {
  color:#6b7280;
  font-size:14px;
  font-weight:700;
  margin-bottom:24px;
}

.article-content {
  color:#1f2937;
  font-size:17px;
  line-height:1.7;
}

.article-content h3 {
  color:#4c78b8;
  font-size:24px;
  margin:30px 0 12px;
  font-weight:700;
}

.article-content h4 {
  color:#111827;
  font-size:19px;
  margin:24px 0 10px;
  font-weight:800;
}

.article-content p {
  margin:0 0 16px;
}

.article-content ul {
  margin:0 0 18px 24px;
}

.article-content li {
  margin:5px 0;
}

.article-content .page-marker {
  display:inline-block;
  margin:22px 0 10px;
  padding:4px 10px;
  background:#eef2ff;
  color:#4868a8;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.article-content table {
  width:100%;
  border-collapse:collapse;
  margin:18px 0 24px;
  font-size:15px;
}

.article-content th,
.article-content td {
  border:1px solid #6b7280;
  padding:8px 10px;
  vertical-align:top;
}

.article-content th {
  background:#f3f4f6;
  font-weight:900;
}

.loading,
.error {
  max-width:820px;
  margin:40px auto;
  background:#f9fafb;
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  color:#374151;
  font-weight:700;
}

.error { color:#b91c1c; background:#fff1f2; }

@media(max-width:900px) {
  .grid { grid-template-columns:repeat(2,1fr); }
  .chapter summary { font-size:20px; min-height:112px; }
}

@media(max-width:560px) {
  .grid { grid-template-columns:1fr; }
  .chapter summary { min-height:92px; }
  .panel h2 { font-size:24px; }
  .subchapter-btn { font-size:16px; }
  .article { padding:24px; }
  .article h2 { font-size:26px; }
  .search-box { flex-direction:column; }
}
</style>
</head>

<body>
<div id="home" class="wrapper">
  <header>
    <h1>SENORIF interactif</h1>
    <p class="subtitle">Cancers et pathologies du sein — navigation par chapitres</p>

    <div class="search-box">
      <input id="searchInput" type="search" placeholder="Rechercher un sous-chapitre…" oninput="filterChapters()">
      <button type="button" onclick="clearSearch()">Effacer</button>
    </div>
  </header>

  <div id="status" class="loading">Chargement du référentiel SENORIF…</div>
  <div id="chaptersGrid" class="grid"></div>
</div>

<div id="subpage" class="page">
  <button class="back" onclick="goHome()">← Retour aux chapitres</button>
  <article class="article" id="article">
    <div class="chapter-label" id="article-chapter"></div>
    <h2 id="article-title"></h2>
    <div class="pages" id="article-pages"></div>
    <div class="article-content" id="article-content"></div>
  </article>
</div>

<script>
let DATA = null;
let CHAPTERS = [];
let ACTIVE_CHAPTERS = [];
let COLORS = [
  "#5570AE", "#6FAE93", "#9A88C1", "#B6689D",
  "#C25D6F", "#9AAA8E", "#394B83", "#504B82",
  "#C65F70"
];

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function pageLabel(item) {
  if (!item) return "";
  if (item.page_debut && item.page_fin && item.page_debut !== item.page_fin) {
    return "Pages " + item.page_debut + " à " + item.page_fin;
  }
  if (item.page_debut) return "Page " + item.page_debut;
  return "";
}

/* Mise en forme automatique du texte extrait :
   - supprime les marques [[PAGE]]
   - recrée des paragraphes
   - détecte les listes simples
   - recrée quelques tableaux simples quand deux colonnes Situation/Recommandation sont détectées
*/
function formatContent(raw) {
  if (!raw) return "<p>Aucun contenu trouvé pour ce sous-chapitre.</p>";

  let text = String(raw)
    .replace(/\r/g, "")
    .replace(/\[\[PAGE\s*(\d+)\]\]/g, "\n@@PAGE:$1@@\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let html = "";
  let buffer = [];
  let list = [];
  let i = 0;

  function flushParagraph() {
    if (buffer.length) {
      html += "<p>" + escapeHtml(buffer.join(" ")) + "</p>";
      buffer = [];
    }
  }

  function flushList() {
    if (list.length) {
      html += "<ul>" + list.map(x => "<li>" + escapeHtml(x) + "</li>").join("") + "</ul>";
      list = [];
    }
  }

  function isPageMarker(l) { return /^@@PAGE:\d+@@$/.test(l); }
  function isAllCapsTitle(l) {
    return l.length > 3 &&
      l.length < 80 &&
      l === l.toUpperCase() &&
      /[A-ZÉÈÀÙÂÊÎÔÛÄËÏÖÜÇ]/.test(l);
  }

  function looksLikeBullet(l) {
    return /^[-•–]\s+/.test(l) || /^[0-9]+\.\s+/.test(l);
  }

  while (i < lines.length) {
    let l = lines[i];

    if (isPageMarker(l)) {
      flushParagraph(); flushList();
      html += '<span class="page-marker">Page ' + l.match(/\d+/)[0] + '</span>';
      i++;
      continue;
    }

    // Détection très simple du tableau Situation / Recommandation
    if (l.toLowerCase() === "situation" && lines[i+1] && lines[i+1].toLowerCase() === "recommandation") {
      flushParagraph(); flushList();
      i += 2;
      let rows = [];
      while (i + 1 < lines.length && !isPageMarker(lines[i]) && !isAllCapsTitle(lines[i]) && rows.length < 20) {
        let a = lines[i], b = lines[i+1];
        if (!a || !b) break;
        if (a.length < 4 || b.length < 4) break;
        rows.push([a, b]);
        i += 2;
        if (i < lines.length && (lines[i].toLowerCase() === "situation" || lines[i].toLowerCase() === "recommandation")) i++;
      }
      if (rows.length) {
        html += '<table><thead><tr><th>Situation</th><th>Recommandation</th></tr></thead><tbody>';
        rows.forEach(r => html += "<tr><td>" + escapeHtml(r[0]) + "</td><td>" + escapeHtml(r[1]) + "</td></tr>");
        html += "</tbody></table>";
        continue;
      }
    }

    if (isAllCapsTitle(l)) {
      flushParagraph(); flushList();
      html += "<h3>" + escapeHtml(l) + "</h3>";
      i++;
      continue;
    }

    if (looksLikeBullet(l)) {
      flushParagraph();
      list.push(l.replace(/^[-•–]\s+/, "").replace(/^[0-9]+\.\s+/, ""));
      i++;
      continue;
    }

    // Ligne courte suivie d'un paragraphe : sous-titre probable
    if (l.length < 65 && i + 1 < lines.length && lines[i+1].length > 80) {
      flushParagraph(); flushList();
      html += "<h4>" + escapeHtml(l) + "</h4>";
      i++;
      continue;
    }

    buffer.push(l);
    i++;
  }

  flushParagraph();
  flushList();

  return html;
}

function loadData() {
  fetch("contenus_senorif.json?v=" + Date.now())
    .then(function(response) {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .then(function(json) {
      DATA = json;
      CHAPTERS = json.chapitres || [];
      ACTIVE_CHAPTERS = CHAPTERS;
      document.getElementById("status").style.display = "none";
      renderChapters(ACTIVE_CHAPTERS);
    })
    .catch(function(error) {
      document.getElementById("status").className = "error";
      document.getElementById("status").innerHTML =
        "Impossible de charger <b>contenus_senorif.json</b>.<br>" +
        "Vérifie que <b>index.html</b> et <b>contenus_senorif.json</b> sont dans le même dossier GitHub.<br><br>" +
        "Détail : " + escapeHtml(error.message);
    });
}

function renderChapters(chapters) {
  ACTIVE_CHAPTERS = chapters;
  const grid = document.getElementById("chaptersGrid");
  grid.innerHTML = "";

  chapters.forEach(function(chapter, chapterIndex) {
    const originalIndex = CHAPTERS.indexOf(chapter);
    const colorIndex = originalIndex >= 0 ? originalIndex : chapterIndex;
    const color = COLORS[colorIndex % COLORS.length];

    const details = document.createElement("details");
    details.className = "chapter";
    details.style.setProperty("--accent", color);

    const subchapters = chapter.sous_chapitres || [];
    const items = subchapters.map(function(sub, subIndex) {
      return `
        <li>
          <button class="subchapter-btn" type="button" onclick="openSubchapter(${chapterIndex}, ${subIndex})">
            <span class="chev">›</span>
            <span>${escapeHtml(sub.titre)}</span>
          </button>
        </li>`;
    }).join("");

    details.innerHTML = `
      <summary>${escapeHtml(chapter.titre)}</summary>
      <div class="panel">
        <div class="arrow"></div>
        <h2>${escapeHtml(chapter.titre)}</h2>
        <ul>${items || "<li>Aucun sous-chapitre trouvé.</li>"}</ul>
      </div>
    `;

    grid.appendChild(details);
  });
}

function openSubchapter(chapterIndex, subIndex) {
  const chapter = ACTIVE_CHAPTERS[chapterIndex];
  const sub = chapter.sous_chapitres[subIndex];

  const originalIndex = CHAPTERS.findIndex(function(c) { return c.titre === chapter.titre; });
  const colorIndex = originalIndex >= 0 ? originalIndex : chapterIndex;
  const color = COLORS[colorIndex % COLORS.length];

  document.getElementById("home").style.display = "none";
  document.getElementById("subpage").classList.add("active");
  document.getElementById("article").style.setProperty("--article-color", color);
  document.getElementById("article-chapter").textContent = chapter.titre;
  document.getElementById("article-title").textContent = sub.titre;
  document.getElementById("article-pages").textContent = pageLabel(sub);
  document.getElementById("article-content").innerHTML = formatContent(sub.contenu_texte || "");
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById("subpage").classList.remove("active");
  document.getElementById("home").style.display = "block";
  window.scrollTo(0, 0);
}

function filterChapters() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) {
    renderChapters(CHAPTERS);
    return;
  }

  const filtered = CHAPTERS
    .map(function(chapter) {
      const titleMatch = chapter.titre.toLowerCase().includes(q);
      const matchingSubs = (chapter.sous_chapitres || []).filter(function(sub) {
        return (sub.titre || "").toLowerCase().includes(q) ||
               (sub.contenu_texte || "").toLowerCase().includes(q);
      });

      if (titleMatch) return chapter;
      if (matchingSubs.length) {
        return Object.assign({}, chapter, { sous_chapitres: matchingSubs });
      }
      return null;
    })
    .filter(Boolean);

  renderChapters(filtered);
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  renderChapters(CHAPTERS);
}

loadData();
</script>
</body>
</html>
