<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stades pTNM/AJCC 2018 — Généralités</title>
<style>
:root {
  --blue:#4c78b8;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --bg:#ffffff;
  --card:#f8fafc;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}
main {
  max-width:900px;
  margin:0 auto;
  padding:38px 24px 70px;
}
a { color:var(--blue); }
.back {
  display:inline-block;
  margin-bottom:28px;
  color:var(--blue);
  text-decoration:none;
  font-weight:800;
}
.back:hover { text-decoration:underline; }
h1 {
  color:var(--blue);
  font-size:34px;
  font-weight:500;
  margin:0 0 14px;
}
h2 {
  color:var(--blue);
  font-size:24px;
  font-weight:500;
  margin:0 0 22px;
}
.subtitle {
  color:var(--muted);
  margin-bottom:30px;
}
.list {
  display:grid;
  gap:12px;
  margin-top:24px;
}
.item {
  display:block;
  padding:16px 18px;
  border:1px solid var(--border);
  border-left:8px solid var(--blue);
  border-radius:14px;
  background:var(--card);
  color:var(--text);
  text-decoration:none;
  font-weight:800;
}
.item:hover { background:#eef5ff; }
.content {
  background:white;
  border-top:10px solid var(--blue);
  border-radius:20px;
  box-shadow:0 10px 28px rgba(31,50,90,.08);
  padding:34px;
}
.content p { font-size:16px; margin:0 0 16px; }
.content ul { margin:0 0 18px 24px; }
.content li { margin:6px 0; }
.note {
  padding:14px 16px;
  background:#f9fafb;
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--muted);
}
@media(max-width:600px) {
  main { padding:28px 18px 60px; }
  h1 { font-size:28px; }
  .content { padding:24px; }
}
</style>
</head>
<body>
<main>
<a class="back" href="index.html">← Retour aux généralités</a>
<div class="content">
  <h1>Généralités</h1>
  <h2>Stades pTNM/AJCC 2018</h2>
  <div class="note">
    Colle ici le texte complet du sous-chapitre « Stades pTNM/AJCC 2018 » depuis le PDF SENORIF.
  </div>
</div>
</main>
</body>
</html>
